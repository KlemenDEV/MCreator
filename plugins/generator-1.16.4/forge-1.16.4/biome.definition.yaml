templates:
  - template: json/biome/biome.json.ftl
    writer: json
    name: "@MODDATAROOT/worldgen/biome/@registryname.json"
  - template: json/biome/biome_builder.json.ftl
    writer: json
    name: "@MODDATAROOT/worldgen/configured_surface_builder/@registryname.json"
  - template: biome.java.ftl
    condition: spawnOrBiomeDictionary()
    deleteWhenConditionFalse: true
    name: "@SRCROOT/@BASEPACKAGEPATH/world/biome/@NAMEBiome.java"

localizationkeys:
  - key: biome.@modid.@registryname
    mapto: name
